name: Daily Music Chart Agent

on:
  schedule:
    - cron: '0 9 * * *' # Запуск каждый день в 09:00 по UTC (12:00 по МСК)
  workflow_dispatch: # Позволяет запустить вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Agent
        run: python agent.py

      - name: Commit and push report
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add charts.db ОТЧЕТ.md
          git commit -m "🤖 Auto-update: Daily chart report" || echo "No changes to commit"
          git push
